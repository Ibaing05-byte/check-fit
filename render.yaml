services:
  - type: web
    name: saclo-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /api/health
    envVars:
      - key: NODE_VERSION
        value: 20
      - key: FRONTEND_ORIGIN
        value: https://saclo.net,https://ibaing05-byte.github.io,http://localhost:8000,http://127.0.0.1:8000
      - key: OPENAI_VISION_MODEL
        value: gpt-4.1-mini
      - key: MAX_IMAGE_MB
        value: 4
      - key: MAX_OPENAI_IMAGE_SIDE
        value: 1200
      - key: OPENAI_IMAGE_JPEG_QUALITY
        value: 76
      - key: TARGET_OPENAI_IMAGE_MB
        value: 2.2
      - key: OPENAI_API_KEY
        sync: false
